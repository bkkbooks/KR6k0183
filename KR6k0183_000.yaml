body:
  text: 翻刻教誡律儀敘諸善律儀佛家之柱石也道品之樓觀禪定之心城皆基于此矣南山大師嘗著行事鈔若于卷廣開毗尼之學風然其文浩瀚望洋難闖故重編此書以誘奘新學文簡義深行相條件提耳指掌可謂至矣牛門正定教院弦我上人捐衣鉢資翻刻之布于世今復欲附其𮝨版于我緣山以施之乎四方一日上人來謀于余余嘉其志重謀諸上座上座允之乃印刷之則字畫鮮明章句精正頗為善本古人曰流通法者莫若於印造吁上人意蓋在于比歟頃日余應諸子之囑講此書因粗攄其引由爾安政戊午春正月緣山南溪圓海撰
